syntax = "proto3";
package whisper;

option go_package = "transcriber-bot/gen/whisper";

service TranscriptionService {
  // Synchronous (legacy) — client streams audio, blocks until transcription is done.
  rpc Transcribe(stream TranscribeChunk) returns (TranscribeResponse);

  // Async — client streams audio, gets a job_id immediately.
  rpc Submit(stream TranscribeChunk) returns (SubmitResponse);

  // Poll job status and retrieve result when done.
  rpc GetStatus(StatusRequest) returns (StatusResponse);

  // Cancel a pending or running job.
  rpc Cancel(CancelRequest) returns (CancelResponse);
}

message CancelRequest {
  string job_id = 1;
}

message CancelResponse {
  bool cancelled = 1; // true if job was found and marked for cancellation
}

// Transcription preset and optional overrides.
// The backend applies the named preset's default parameters, then applies
// any non-empty override fields on top.
message TranscriptionOptions {
  // Named preset: "auto", "voice", "lecture", "meeting".
  // Empty string is treated as "auto".
  string preset = 1;
  // Override language (e.g. "ru", "en"). Empty = use preset default.
  string language = 2;
  // Override the initial prompt sent to the model. Empty = use preset default.
  string initial_prompt = 3;
}

// Sent by the client one chunk at a time.
// The first chunk MUST have a non-empty format field ("ogg", "mp4", etc.).
// The first chunk MAY also carry transcription options.
message TranscribeChunk {
  bytes data = 1;
  string format = 2; // first chunk: file format ("ogg", "mp4", etc.)
  TranscriptionOptions options = 3; // first chunk: transcription options (optional)
}

message TranscribeResponse {
  string text = 1;
}

message SubmitResponse {
  string job_id = 1;
  int32 queue_position = 2; // 1 = currently running, 2+ = waiting
}

message StatusRequest {
  string job_id = 1;
}

enum JobStatus {
  ACCEPTED = 0;
  DOWNLOADING = 1;
  QUEUED = 2;
  RUNNING = 3;
  DONE = 4;
  FAILED = 5;
}

message Segment {
  float start = 1; // start time in seconds
  float end = 2; // end time in seconds
  string text = 3; // transcribed text for this segment
}

message StatusResponse {
  string job_id = 1;
  JobStatus status = 2;
  string text = 3; // plain text (all segments joined); populated when status == DONE
  string error = 4; // populated when status == FAILED
  repeated Segment segments = 5; // timestamped segments; populated when status == DONE (preset-dependent)
  float progress_percent = 6; // best-effort progress estimate for RUNNING jobs, 0..100
  string stage = 7; // textual stage name: accepted/downloading/queued/running/done/failed
  int32 attempts = 8;
  int32 max_attempts = 9;
}
