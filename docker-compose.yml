networks:
  default: {}
  whisper-net:
    external: true

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:9.6
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped
    networks:
      - default

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file: .env
    environment:
      - WHISPER_GRPC_HOST=whisper-ingress
      - WHISPER_GRPC_PORT=50053
      - TELEGRAM_LOCAL_API_URL=http://telegram-bot-api:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    restart: unless-stopped
    networks:
      - default      # для telegram-bot-api
      - whisper-net  # для whisper
    depends_on:
      - telegram-bot-api

volumes:
  telegram-bot-api-data:
