services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:9.6
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    environment:
      - GRPC_PORT=50053
      - WHISPER_MODEL=small
    volumes:
      - whisper-model-cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50053'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  bot:
    build:
      context: .
      dockerfile: bot-go/Dockerfile
    env_file: .env
    environment:
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
      - TELEGRAM_LOCAL_API_URL=http://telegram-bot-api:8081
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    restart: unless-stopped
    depends_on:
      whisper:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started

volumes:
  telegram-bot-api-data:
  whisper-model-cache:
