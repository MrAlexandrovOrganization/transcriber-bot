services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    environment:
      - GRPC_PORT=50053
      - WHISPER_MODEL=small

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
      - TELEGRAM_LOCAL_API_URL=http://telegram-bot-api:8081
    depends_on:
      - whisper
      - telegram-bot-api

volumes:
  telegram-bot-api-data:
